<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZCCD Asset Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            canvas: '#0b1329',
                            panel: '#151f32',
                            field: '#1e293b',
                            accent: '#06b6d4',
                            highlight: '#22d3ee',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0b1329; }
        .app-panel { transition: opacity 0.2s ease-in-out; }
        .hidden { display: none; opacity: 0; }
        .block { opacity: 1; }
        
        /* Smooth Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0b1329; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        
        /* Dropdown smoothness */
        select, input { transition: border-color 0.15s ease, background-color 0.15s ease; }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col selection:bg-cyan-500/30">

<div class="flex-grow w-full max-w-[1700px] mx-auto px-4 py-6 flex flex-col gap-6">
    <header class="bg-brand-panel border border-slate-800 rounded-2xl p-6 flex flex-col md:flex-row justify-between items-center gap-6 shadow-xl">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-gradient-to-tr from-cyan-600 to-teal-400 rounded-xl flex items-center justify-center text-brand-canvas shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
            </div>
            <div>
                <h1 class="text-xl font-extrabold text-white">ZCCD Asset Management</h1>
                <p class="text-slate-400 text-xs font-medium uppercase tracking-widest">Infrastructure Asset Registry</p>
            </div>
        </div>
    </header>

    <nav class="grid grid-cols-3 gap-2 bg-brand-panel/40 p-1.5 rounded-xl border border-slate-800">
        <button id="tab-dashboard" onclick="switchView('view-dashboard', this)" class="py-3 text-xs font-bold tracking-wider rounded-lg transition-all duration-200 bg-brand-panel border border-cyan-500/20 text-cyan-400">DASHBOARD</button>
        <button id="tab-database" onclick="switchView('view-database', this)" class="py-3 text-xs font-bold tracking-wider rounded-lg transition-all duration-200 text-slate-400 hover:text-slate-200">REGISTRY</button>
        <button id="tab-entry" onclick="switchView('view-entry', this)" class="py-3 text-xs font-bold tracking-wider rounded-lg transition-all duration-200 text-slate-400 hover:text-slate-200">ENTRY DESK</button>
    </nav>

    <main class="flex-grow">
        <!-- Dashboard -->
        <section id="view-dashboard" class="app-panel block">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-brand-panel border border-slate-800 rounded-xl p-5 shadow-lg">
                    <p class="text-[10px] text-slate-400 uppercase font-bold">Registered</p>
                    <h3 id="stat-total-assets" class="text-2xl font-black text-cyan-400 mt-1">0</h3>
                </div>
            </div>
        </section>

        <!-- Database -->
        <section id="view-database" class="app-panel hidden">
            <div class="bg-brand-panel border border-slate-800 rounded-2xl p-6 shadow-xl">
                <div class="mb-4">
                    <input id="searchInput" oninput="debouncedFilter()" type="text" placeholder="Search registry..." 
                           class="w-full bg-brand-canvas border border-slate-800 rounded-lg p-3 text-sm text-slate-200 outline-none focus:border-cyan-500">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-xs">
                        <thead><tr class="text-cyan-400 uppercase text-[10px]"><th class="p-4">Jurisdiction</th><th class="p-4">Identity</th><th class="p-4">Logs</th><th class="p-4">Actions</th></tr></thead>
                        <tbody id="registryTableBody" class="divide-y divide-slate-800"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- Entry -->
        <section id="view-entry" class="app-panel hidden">
            <div class="bg-brand-panel border border-slate-800 rounded-2xl p-6 shadow-xl max-w-2xl mx-auto">
                <form id="civilAssetForm" class="space-y-4">
                    <input type="hidden" id="editingUid">
                    <input type="text" id="structureIdentity" placeholder="Building Name" required class="w-full bg-brand-canvas border border-slate-800 p-3 rounded-lg text-xs">
                    <textarea id="civilDetails" placeholder="Log details..." required class="w-full bg-brand-canvas border border-slate-800 p-3 rounded-lg text-xs" rows="3"></textarea>
                    <button type="submit" class="w-full bg-cyan-600 text-white p-3 rounded-lg font-bold text-xs uppercase hover:bg-cyan-500">Submit</button>
                </form>
            </div>
        </section>
    </main>
</div>

<!-- Modal -->
<div id="logModal" class="fixed inset-0 z-50 hidden bg-black/70 flex items-center justify-center p-4">
    <div class="bg-brand-panel border border-slate-700 w-full max-w-sm rounded-2xl p-6 shadow-2xl">
        <h3 class="text-sm font-bold mb-4">Manage Log</h3>
        <input type="hidden" id="targetAssetUid"><input type="hidden" id="editingLogId">
        <textarea id="logText" class="w-full bg-brand-canvas border border-slate-700 rounded-lg p-3 text-xs mb-4" rows="3"></textarea>
        <div class="flex gap-2">
            <button onclick="saveLog()" class="flex-1 bg-cyan-600 text-white py-2 rounded-lg text-xs font-bold">Save</button>
            <button onclick="closeLogModal()" class="flex-1 bg-slate-700 text-white py-2 rounded-lg text-xs font-bold">Cancel</button>
        </div>
    </div>
</div>

<script>
    let dataStorage = JSON.parse(localStorage.getItem('bpdb_mym_civil_assets')) || [];
    
    // Performance: Debounce Filter function
    let debounceTimer;
    function debouncedFilter() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            displayRegistryTable();
        }, 300); // Wait 300ms before re-rendering
    }

    function switchView(panelId, btn) {
        document.querySelectorAll('.app-panel').forEach(p => p.classList.add('hidden'));
        document.getElementById(panelId).classList.remove('hidden');
        document.querySelectorAll('nav button').forEach(b => {
            b.classList.remove('text-cyan-400', 'bg-brand-panel', 'border');
            b.classList.add('text-slate-400');
        });
        btn.classList.add('text-cyan-400', 'bg-brand-panel', 'border');
        btn.classList.remove('text-slate-400');
    }

    function displayRegistryTable() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const body = document.getElementById('registryTableBody');
        const fragment = document.createDocumentFragment(); // Efficient DOM insertion
        
        body.innerHTML = '';
        
        dataStorage.forEach(asset => {
            if (query && !asset.identity.toLowerCase().includes(query)) return;
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="p-4 font-bold text-cyan-400">${asset.layer || 'N/A'}</td>
                <td class="p-4">${asset.identity}</td>
                <td class="p-4 space-y-1">
                    ${(asset.logs || []).map(l => `<div class="bg-slate-800 p-2 rounded text-[10px] flex justify-between">
                        <span>${l.text}</span>
                        <div class="flex gap-2 text-cyan-400">
                            <span class="cursor-pointer" onclick="editLog(${asset.uid}, ${l.id})">Edit</span>
                            <span class="cursor-pointer text-red-400" onclick="deleteLog(${asset.uid}, ${l.id})">X</span>
                        </div>
                    </div>`).join('')}
                    <button class="text-[9px] bg-slate-900 px-2 py-1 rounded" onclick="addLog(${asset.uid})">+ Add Log</button>
                </td>
                <td class="p-4 text-red-400 cursor-pointer" onclick="purgeAsset(${asset.uid})">Purge</td>
            `;
            fragment.appendChild(tr);
        });
        body.appendChild(fragment);
        document.getElementById('stat-total-assets').textContent = dataStorage.length;
    }

    function addLog(uid) {
        document.getElementById('targetAssetUid').value = uid;
        document.getElementById('editingLogId').value = '';
        document.getElementById('logText').value = '';
        document.getElementById('logModal').classList.remove('hidden');
    }

    function editLog(uid, logId) {
        const asset = dataStorage.find(a => a.uid === uid);
        const log = asset.logs.find(l => l.id == logId);
        document.getElementById('targetAssetUid').value = uid;
        document.getElementById('editingLogId').value = logId;
        document.getElementById('logText').value = log.text;
        document.getElementById('logModal').classList.remove('hidden');
    }

    function saveLog() {
        const uid = parseInt(document.getElementById('targetAssetUid').value);
        const logId = document.getElementById('editingLogId').value;
        const text = document.getElementById('logText').value;
        const asset = dataStorage.find(a => a.uid === uid);
        
        if (!asset.logs) asset.logs = [];
        
        if (logId) {
            const logIdx = asset.logs.findIndex(l => l.id == logId);
            asset.logs[logIdx].text = text;
        } else {
            asset.logs.push({ id: Date.now(), text: text });
        }
        localStorage.setItem('bpdb_mym_civil_assets', JSON.stringify(dataStorage));
        closeLogModal();
        displayRegistryTable();
    }

    function deleteLog(uid, logId) {
        const asset = dataStorage.find(a => a.uid === uid);
        asset.logs = asset.logs.filter(l => l.id != logId);
        localStorage.setItem('bpdb_mym_civil_assets', JSON.stringify(dataStorage));
        displayRegistryTable();
    }

    function purgeAsset(uid) {
        dataStorage = dataStorage.filter(a => a.uid !== uid);
        localStorage.setItem('bpdb_mym_civil_assets', JSON.stringify(dataStorage));
        displayRegistryTable();
    }

    function closeLogModal() { document.getElementById('logModal').classList.add('hidden'); }

    // Initial load
    window.onload = displayRegistryTable;
</script>
</body>
</html>
